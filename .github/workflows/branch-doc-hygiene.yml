name: Branch doc hygiene

on:
  push:
    branches:
      - feat/hardening-and-polish

permissions:
  contents: write

env:
  MISE_EXPERIMENTAL: true
  MINI_PATH: ${{ github.workspace }}/.ci/mini.nvim

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: feat/hardening-and-polish

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: mise run install

      - name: Mark implementation helpers private
        run: |
          python - <<'PY'
          from pathlib import Path

          files = list(Path("lua/pint").glob("*.lua"))
          private_typed_locals = {
              "active", "history", "cache", "instances", "scopes", "redraw",
              "installed_maps", "states",
          }

          for path in files:
              lines = path.read_text().splitlines()
              inserts = []

              for index, line in enumerate(lines):
                  stripped = line.strip()
                  should_mark = stripped.startswith("local function ")
                  if path.name == "ui.lua" and stripped.startswith("function M."):
                      should_mark = True
                  if stripped.startswith("local "):
                      name = stripped.removeprefix("local ").split()[0]
                      if name in private_typed_locals:
                          should_mark = True

                  if not should_mark:
                      continue

                  block_start = index
                  while block_start > 0 and lines[block_start - 1].lstrip().startswith("---@"):
                      block_start -= 1
                  if block_start > 0 and lines[block_start - 1].strip() == "---@private":
                      continue
                  if any(item.strip() == "---@private" for item in lines[block_start:index]):
                      continue
                  inserts.append(block_start)

              for index in reversed(sorted(set(inserts))):
                  lines.insert(index, "---@private")
              path.write_text("\n".join(lines) + "\n")
          PY

      - name: Format and generate help
        run: |
          make format
          mise run docs

      - name: Commit documentation hygiene
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lua/pint doc/pint.txt
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "docs: keep Pint internals out of public help"
          git push origin HEAD:feat/hardening-and-polish
