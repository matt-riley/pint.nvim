name: Branch autoformat

on:
  push:
    branches:
      - feat/hardening-and-polish

permissions:
  contents: write

env:
  MISE_EXPERIMENTAL: true

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: feat/hardening-and-polish

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Format Lua
        run: make format

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lua plugin tests
          git commit -m "style: format Pint implementation"
          git push origin HEAD:feat/hardening-and-polish
