name: Branch type fixes

on:
  push:
    branches:
      - feat/hardening-and-polish

permissions:
  contents: write

env:
  MISE_EXPERIMENTAL: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: feat/hardening-and-polish

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Apply focused type fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          dashboard = Path("lua/pint/dashboard.lua")
          text = dashboard.read_text()
          old_icons = "  if _G.MiniIcons then\n    local icon, highlight = _G.MiniIcons.get(\"file\", file)\n    if icon then\n      return icon, highlight or \"PintDashboardIcon\"\n    end\n  end\n"
          new_icons = "  local mini_icons = rawget(_G, \"MiniIcons\")\n  local get_icon = type(mini_icons) == \"table\" and rawget(mini_icons, \"get\") or nil\n  if type(get_icon) == \"function\" then\n    local icon, highlight = get_icon(\"file\", file)\n    if icon then\n      return icon, highlight or \"PintDashboardIcon\"\n    end\n  end\n"
          old_header = "  local header = type(M.config.header) == \"string\" and vim.split(M.config.header, \"\\n\", { plain = true })\n    or M.config.header\n    or {}\n"
          new_header = "  local header = M.config.header\n  if type(header) == \"string\" then\n    header = vim.split(header, \"\\n\", { plain = true })\n  elseif type(header) ~= \"table\" then\n    header = {}\n  end\n"
          if old_icons not in text or old_header not in text:
              raise SystemExit("dashboard replacement target not found")
          dashboard.write_text(text.replace(old_icons, new_icons, 1).replace(old_header, new_header, 1))

          indent = Path("lua/pint/indent.lua")
          text = indent.read_text()
          old_mapping = "  local previous = vim.fn.maparg(lhs, mode, false, true)\n  if vim.tbl_isempty(previous) then\n    previous = nil\n  end\n"
          new_mapping = "  local existing = vim.fn.maparg(lhs, mode, false, true)\n  ---@type table?\n  local previous = vim.tbl_isempty(existing) and nil or existing\n"
          if old_mapping not in text:
              raise SystemExit("indent replacement target not found")
          indent.write_text(text.replace(old_mapping, new_mapping, 1))
          PY

      - name: Format Lua
        run: make format

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lua/pint/dashboard.lua lua/pint/indent.lua
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "fix: satisfy LuaLS type checks"
          git push origin HEAD:feat/hardening-and-polish
