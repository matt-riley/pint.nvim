name: Branch typecheck diagnostics

on:
  push:
    branches:
      - feat/hardening-and-polish

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: feat/hardening-and-polish

      - name: Install LuaLS
        run: |
          mkdir -p "${RUNNER_TEMP}/luals"
          curl -fsSL \
            "https://github.com/LuaLS/lua-language-server/releases/download/3.13.6/lua-language-server-3.13.6-linux-x64.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/luals"

      - name: Generate diagnostics
        run: |
          mkdir -p "${RUNNER_TEMP}/luals-log" .ci
          "${RUNNER_TEMP}/luals/bin/lua-language-server" \
            --check=. \
            --checklevel=Warning \
            --logpath="${RUNNER_TEMP}/luals-log" \
            || true
          cp "${RUNNER_TEMP}/luals-log/check.json" .ci/luals-check.json

      - name: Commit diagnostics
        run: |
          if git diff --quiet -- .ci/luals-check.json && git ls-files --error-unmatch .ci/luals-check.json >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .ci/luals-check.json
          git commit -m "chore: capture LuaLS diagnostics"
          git push origin HEAD:feat/hardening-and-polish
