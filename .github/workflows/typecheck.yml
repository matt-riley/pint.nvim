name: Typecheck

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install LuaLS
        run: |
          mkdir -p "${RUNNER_TEMP}/luals"
          curl -fsSL \
            "https://github.com/LuaLS/lua-language-server/releases/download/3.13.6/lua-language-server-3.13.6-linux-x64.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/luals"

      - name: Run typecheck
        run: |
          mkdir -p "${RUNNER_TEMP}/luals-log" .ci
          "${RUNNER_TEMP}/luals/bin/lua-language-server" \
            --check=. \
            --checklevel=Warning \
            --logpath="${RUNNER_TEMP}/luals-log" \
            || true
          cp "${RUNNER_TEMP}/luals-log/check.json" .ci/luals-check.json

      - name: Commit feature-branch diagnostics
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if git diff --quiet -- .ci/luals-check.json && git ls-files --error-unmatch .ci/luals-check.json >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f .ci/luals-check.json
          git commit -m "chore: capture LuaLS diagnostics"
          git push origin HEAD:${{ github.head_ref }}

      - name: Report diagnostics
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          path = pathlib.Path(".ci/luals-check.json")
          diagnostics = json.loads(path.read_text() or "[]")
          if not diagnostics:
              print("LuaLS diagnostics: none")
              sys.exit(0)

          print(json.dumps(diagnostics, indent=2))
          sys.exit(1)
          PY
