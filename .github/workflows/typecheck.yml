name: Typecheck

on:
  push:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install LuaLS
        run: |
          mkdir -p "${RUNNER_TEMP}/luals"
          curl -fsSL \
            "https://github.com/LuaLS/lua-language-server/releases/download/3.13.6/lua-language-server-3.13.6-linux-x64.tar.gz" \
            | tar -xz -C "${RUNNER_TEMP}/luals"

      - name: Run typecheck
        run: |
          mkdir -p "${RUNNER_TEMP}/luals-log"
          "${RUNNER_TEMP}/luals/bin/lua-language-server" \
            --check=. \
            --checklevel=Warning \
            --logpath="${RUNNER_TEMP}/luals-log" \
            || true

      - name: Report diagnostics
        run: |
          check_file="$(find "${RUNNER_TEMP}/luals-log" -name check.json -type f -print -quit)"
          if [ -z "$check_file" ]; then
            echo "No LuaLS diagnostics file generated."
            exit 1
          fi
          python - "$check_file" <<'PY'
          import json
          import pathlib
          import sys

          diagnostics = json.loads(pathlib.Path(sys.argv[1]).read_text() or "[]")
          if not diagnostics:
              print("LuaLS diagnostics: none")
              sys.exit(0)

          print(json.dumps(diagnostics, indent=2))
          sys.exit(1)
          PY
