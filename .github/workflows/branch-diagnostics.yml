name: Branch diagnostics

on:
  pull_request:

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      MISE_EXPERIMENTAL: true
      MINI_PATH: ${{ github.workspace }}/.ci/mini.nvim
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Install dependencies
        run: mise run install

      - name: Run tests
        id: tests
        continue-on-error: true
        run: mise run test

      - name: Run lint
        id: lint
        continue-on-error: true
        run: mise run lint

      - name: Run format check
        id: format
        continue-on-error: true
        run: mise run fmt

      - name: Fail when a diagnostic command failed
        if: ${{ steps.tests.outcome != 'success' || steps.lint.outcome != 'success' || steps.format.outcome != 'success' }}
        run: |
          echo "tests=${{ steps.tests.outcome }}"
          echo "lint=${{ steps.lint.outcome }}"
          echo "format=${{ steps.format.outcome }}"
          exit 1
